<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="height:230px">
  <div class="card-corner">03 / PALETTE</div>
  <div class="label-tag">TEXT TOKENS</div>
  <div style="display:flex; flex-direction:column; gap:10px;">
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="width:140px; font-family:var(--font-primary); font-size:11px; color:#666; letter-spacing:.1em;">TEXT-PRIMARY</div>
      <div style="flex:1; font-family:var(--font-ui); color:#FF6B00; font-size:18px; letter-spacing:.08em; text-transform:uppercase;">SYSTEM NOMINAL — STANDBY 00:14</div>
      <div style="font-family:var(--font-primary);font-size:10px;color:#666">#FF6B00</div>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="width:140px; font-family:var(--font-primary); font-size:11px; color:#666; letter-spacing:.1em;">TEXT-SECONDARY</div>
      <div style="flex:1; font-family:var(--font-ui); color:#CC4400; font-size:16px; letter-spacing:.08em;">Subsystem readout · channel 14B</div>
      <div style="font-family:var(--font-primary);font-size:10px;color:#666">#CC4400</div>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="width:140px; font-family:var(--font-primary); font-size:11px; color:#666; letter-spacing:.1em;">TEXT-VALUE</div>
      <div style="flex:1; font-family:var(--font-primary); color:#FFFFFF; font-size:22px; font-weight:700;">41.327 BR</div>
      <div style="font-family:var(--font-primary);font-size:10px;color:#666">#FFFFFF</div>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="width:140px; font-family:var(--font-primary); font-size:11px; color:#666; letter-spacing:.1em;">TEXT-LABEL</div>
      <div style="flex:1; font-family:var(--font-primary); color:#666; font-size:11px; letter-spacing:.18em; text-transform:uppercase;">[ SYSTEM / PROPULSION / CHN-14B ]</div>
      <div style="font-family:var(--font-primary);font-size:10px;color:#666">#666666</div>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <div style="width:140px; font-family:var(--font-primary); font-size:11px; color:#666; letter-spacing:.1em;">TEXT-DISABLED</div>
      <div style="flex:1; font-family:var(--font-ui); color:#333; font-size:16px; letter-spacing:.08em; text-transform:uppercase;">OFFLINE — NO SIGNAL</div>
      <div style="font-family:var(--font-primary);font-size:10px;color:#666">#333333</div>
    </div>
  </div>
</div>
</body></html>
