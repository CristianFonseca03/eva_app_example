<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.icon-cell { display:flex; flex-direction:column; align-items:center; gap:6px; padding:10px 6px; border:1px solid #3D1500; flex:1; min-width:0; }
.icon-cell img { width:24px; height:24px; filter: brightness(0) saturate(100%) invert(48%) sepia(95%) saturate(2870%) hue-rotate(360deg) brightness(105%) contrast(105%); }
.icon-cell span { font-family:'Share Tech Mono',monospace; font-size:9px; color:#666; letter-spacing:.15em; text-transform:uppercase; }
</style></head>
<body>
<div class="card" style="height:200px">
  <div class="card-corner">21 / BRAND</div>
  <div class="label-tag">ICONOGRAPHY · 1.5PX STROKE · ANGULAR</div>
  <div style="display:grid; grid-template-columns:repeat(6,1fr); gap:10px; padding-top:8px;">
    <div class="icon-cell"><img src="../assets/icons/shield.svg"><span>SHIELD</span></div>
    <div class="icon-cell"><img src="../assets/icons/triangle-alert.svg"><span>ALERT</span></div>
    <div class="icon-cell"><img src="../assets/icons/cross.svg"><span>CROSS</span></div>
    <div class="icon-cell"><img src="../assets/icons/signal.svg"><span>SIGNAL</span></div>
    <div class="icon-cell"><img src="../assets/icons/terminal.svg"><span>TERMINAL</span></div>
    <div class="icon-cell"><img src="../assets/icons/clock.svg"><span>CLOCK</span></div>
    <div class="icon-cell"><img src="../assets/icons/target.svg"><span>TARGET</span></div>
    <div class="icon-cell"><img src="../assets/icons/grid.svg"><span>GRID</span></div>
    <div class="icon-cell"><img src="../assets/icons/lock.svg"><span>LOCK</span></div>
    <div class="icon-cell"><img src="../assets/icons/chevron-down.svg"><span>CHEVRON</span></div>
    <div class="icon-cell"><img src="../assets/icons/menu.svg"><span>MENU</span></div>
    <div class="icon-cell"><img src="../assets/icons/plus.svg"><span>PLUS</span></div>
  </div>
</div>
</body></html>
