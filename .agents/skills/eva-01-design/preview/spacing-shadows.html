<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="height:200px">
  <div class="card-corner">10 / SHAPES</div>
  <div class="label-tag">SHADOWS &amp; GLOWS</div>
  <div style="display:flex; gap:18px; padding-top:14px;">
    <div style="flex:1; display:flex; flex-direction:column; gap:8px; align-items:center;">
      <div style="width:100%; height:54px; background:#0A0A0A; border:1px solid #FF2020; box-shadow:0 0 8px rgba(255,32,32,.6), 0 0 20px rgba(255,32,32,.3); clip-path:polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);"></div>
      <div style="font-family:'Share Tech Mono',monospace; font-size:10px; color:#FF6B00; letter-spacing:.12em;">GLOW-DANGER</div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; gap:8px; align-items:center;">
      <div style="width:100%; height:54px; background:#0A0A0A; border:1px solid #FF6B00; box-shadow:0 0 6px rgba(255,107,0,.5), 0 0 16px rgba(255,107,0,.25); clip-path:polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);"></div>
      <div style="font-family:'Share Tech Mono',monospace; font-size:10px; color:#FF6B00; letter-spacing:.12em;">GLOW-WARNING</div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; gap:8px; align-items:center;">
      <div style="width:100%; height:54px; background:#0A0A0A; border:1px solid #F5C518; box-shadow:0 0 4px rgba(245,197,24,.4), 0 0 12px rgba(245,197,24,.2); clip-path:polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);"></div>
      <div style="font-family:'Share Tech Mono',monospace; font-size:10px; color:#FF6B00; letter-spacing:.12em;">GLOW-ACTIVE</div>
    </div>
    <div style="flex:1; display:flex; flex-direction:column; gap:8px; align-items:center;">
      <div style="width:100%; height:54px; background:#111; border:1px solid #3D1500; box-shadow:0 4px 20px rgba(0,0,0,.8);"></div>
      <div style="font-family:'Share Tech Mono',monospace; font-size:10px; color:#FF6B00; letter-spacing:.12em;">PANEL</div>
    </div>
  </div>
</div>
</body></html>
