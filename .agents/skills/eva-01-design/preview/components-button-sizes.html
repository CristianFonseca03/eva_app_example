<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .btn { font-family:'Rajdhani',sans-serif; text-transform:uppercase; letter-spacing:.12em; font-weight:700; border:0; cursor:pointer; }
  .sm { height:28px; padding:6px 12px; font-size:11px; }
  .md { height:36px; padding:10px 16px; font-size:13px; }
  .lg { height:44px; padding:12px 24px; font-size:15px; }
  .btn-secondary { background:transparent; color:#FF6B00; border:1px solid #FF6B00; clip-path:polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%); }
  .ml { font-family:'Share Tech Mono',monospace; font-size:9px; color:#666; letter-spacing:.18em; text-transform:uppercase;}
</style>
</head>
<body>
<div class="card" style="height:170px">
  <div class="card-corner">12 / COMPONENT</div>
  <div class="label-tag">BUTTON SIZES — SM / MD / LG</div>
  <div style="display:flex; gap:18px; align-items:flex-end; padding-top:14px;">
    <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;"><span class="ml">SM · 28PX</span><button class="btn btn-secondary sm">PROCEED</button></div>
    <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;"><span class="ml">MD · 36PX</span><button class="btn btn-secondary md">PROCEED</button></div>
    <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-start;"><span class="ml">LG · 44PX</span><button class="btn btn-secondary lg">PROCEED</button></div>
  </div>
</div>
</body></html>
