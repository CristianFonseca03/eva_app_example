<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="height:230px">
  <div class="card-corner">01 / PALETTE</div>
  <div class="label-tag">PRIMARY — ACTION &amp; ALERT</div>
  <div class="row">
    <div class="swatch"><div class="swatch-block" style="background:#FF2020;box-shadow:var(--shadow-glow-danger)"></div><div class="swatch-name">DANGER</div><div class="swatch-hex">#FF2020 · emergency</div></div>
    <div class="swatch"><div class="swatch-block" style="background:#FF6B00;box-shadow:var(--shadow-glow-warning)"></div><div class="swatch-name">WARNING</div><div class="swatch-hex">#FF6B00 · workhorse</div></div>
    <div class="swatch"><div class="swatch-block" style="background:#FFB800"></div><div class="swatch-name">CAUTION</div><div class="swatch-hex">#FFB800 · amber</div></div>
    <div class="swatch"><div class="swatch-block" style="background:#F5C518;box-shadow:var(--shadow-glow-active)"></div><div class="swatch-name">ACTIVE</div><div class="swatch-hex">#F5C518 · confirm</div></div>
  </div>
</div>
</body></html>
