<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .btn { font-family:'Rajdhani',sans-serif; text-transform:uppercase; letter-spacing:.12em; font-weight:700; cursor:pointer; border:0; transition:all 150ms ease; }
  .btn-primary { background:#FF2020; color:#fff; padding:10px 16px; height:36px; box-shadow:0 0 8px rgba(255,32,32,.6), 0 0 20px rgba(255,32,32,.3); clip-path:polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%); }
  .btn-primary:hover { box-shadow:0 0 12px rgba(255,32,32,.8), 0 0 24px rgba(255,32,32,.5); }
  .btn-secondary { background:transparent; color:#FF6B00; border:1px solid #FF6B00; padding:10px 16px; height:36px; clip-path:polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%); }
  .btn-secondary:hover { background:rgba(255,107,0,.1); border-width:2px; }
  .btn-outline-danger { background:#000; color:#FF2020; border:1px solid #FF2020; box-shadow:inset 0 0 0 1px #FF2020, inset 0 0 6px rgba(255,32,32,.3); padding:10px 16px; height:36px; clip-path:polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%); }
  .btn-disabled { background:#1A0800; color:#333; border:1px solid #3D1500; padding:10px 16px; height:36px; opacity:.5; cursor:not-allowed; }
  .btn-hazard { background:repeating-linear-gradient(45deg,#FFB800 0,#FFB800 8px,#1A1A00 8px,#1A1A00 16px); padding:0; height:36px; position:relative; clip-path:polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%); border:0; }
  .btn-hazard span { display:inline-flex; align-items:center; justify-content:center; height:100%; padding:0 18px; background:rgba(0,0,0,.7); color:#fff; font-family:'Rajdhani',sans-serif; font-weight:700; letter-spacing:.12em; text-transform:uppercase; font-size:13px; }
  .grp { display:flex; flex-direction:column; gap:6px; }
  .ml { font-family:'Share Tech Mono',monospace; font-size:9px; color:#666; letter-spacing:.18em; text-transform:uppercase;}
</style>
</head>
<body>
<div class="card" style="height:240px">
  <div class="card-corner">11 / COMPONENT</div>
  <div class="label-tag">BUTTONS — VARIANTS</div>
  <div style="display:flex; gap:14px; padding-top:6px; flex-wrap:wrap;">
    <div class="grp"><span class="ml">[ ACTION / PRIMARY ]</span><button class="btn btn-primary">EXECUTE</button></div>
    <div class="grp"><span class="ml">[ ACTION / DEFAULT ]</span><button class="btn btn-secondary">CONFIRM</button></div>
    <div class="grp"><span class="ml">[ ACTION / DESTRUCTIVE ]</span><button class="btn btn-outline-danger">ABORT</button></div>
    <div class="grp"><span class="ml">[ STATE / DISABLED ]</span><button class="btn btn-disabled" disabled>STANDBY</button></div>
    <div class="grp" style="flex-basis:100%;"><span class="ml">[ IRREVERSIBLE / HAZARD ]</span><button class="btn btn-hazard"><span>⚠ &nbsp;PURGE CORE</span></button></div>
  </div>
</div>
</body></html>
