<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .badge {
    display:inline-flex; align-items:center; gap:6px;
    font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:.18em; text-transform:uppercase;
    padding:4px 10px; height:22px;
    clip-path:polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 0 100%);
  }
  .b-active   { background:rgba(107,255,59,.12); color:#6BFF3B; border:1px solid #6BFF3B; }
  .b-standby  { background:rgba(255,184,0,.12); color:#FFB800; border:1px solid #FFB800; }
  .b-danger   { background:rgba(255,32,32,.15); color:#FF2020; border:1px solid #FF2020; animation:p 1.5s ease-in-out infinite;}
  .b-offline  { background:#1a1a1a; color:#888; border:1px solid #444; }
  .pip { width:8px; height:8px; display:inline-block; }
  .nbadge { width:18px; height:18px; background:#FF2020; color:#fff; font-family:'Share Tech Mono',monospace; font-size:10px; display:inline-flex; align-items:center; justify-content:center; box-shadow:0 0 6px rgba(255,32,32,.6); font-weight:700;}
  @keyframes p { 0%,100%{opacity:1} 50%{opacity:.55} }
</style></head>
<body>
<div class="card" style="height:200px">
  <div class="card-corner">15 / COMPONENT</div>
  <div class="label-tag">STATUS BADGES &amp; NOTIFICATION CHIPS</div>
  <div style="display:flex; gap:12px; padding-top:8px; flex-wrap:wrap;">
    <span class="badge b-active"><span class="pip" style="background:#6BFF3B"></span>ACTIVE</span>
    <span class="badge b-standby"><span class="pip" style="background:#FFB800"></span>STANDBY</span>
    <span class="badge b-danger"><span class="pip" style="background:#FF2020"></span>DANGER</span>
    <span class="badge b-offline"><span class="pip" style="background:#888"></span>OFFLINE</span>
    <span class="badge" style="background:rgba(245,197,24,.15); color:#F5C518; border:1px solid #F5C518;">SYNCED</span>
    <span class="badge" style="background:rgba(255,107,0,.12); color:#FF6B00; border:1px solid #FF6B00;">CHN-14B</span>
  </div>
  <div style="display:flex; gap:24px; padding-top:24px; align-items:center;">
    <div style="display:flex; gap:8px; align-items:center;"><span class="nbadge">3</span><span style="font-family:'Share Tech Mono',monospace; font-size:11px; color:#666; letter-spacing:.15em;">NEW ALERTS</span></div>
    <div style="display:flex; gap:8px; align-items:center;"><span class="nbadge" style="background:#FF6B00; box-shadow:0 0 6px rgba(255,107,0,.6);">12</span><span style="font-family:'Share Tech Mono',monospace; font-size:11px; color:#666; letter-spacing:.15em;">PENDING</span></div>
    <div style="display:flex; gap:8px; align-items:center;"><span class="nbadge" style="background:#666; box-shadow:none;">99+</span><span style="font-family:'Share Tech Mono',monospace; font-size:11px; color:#666; letter-spacing:.15em;">ARCHIVE</span></div>
  </div>
</div>
</body></html>
